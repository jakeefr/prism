<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#0d1117"/>

  <defs>
    <!-- Fade-in gradient for the incoming white beam -->
    <linearGradient id="beam-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- =====================================================================
       INCOMING WHITE LIGHT BEAM
       Entry point on left face ≈ (98, 148)
       ===================================================================== -->
  <!-- Outer glow -->
  <line x1="0" y1="148" x2="98" y2="148" stroke="#ffffff" stroke-width="16" opacity="0.05"/>
  <line x1="0" y1="148" x2="98" y2="148" stroke="#ffffff" stroke-width="7"  opacity="0.10"/>
  <!-- Core beam (fades in) -->
  <line x1="0" y1="148" x2="98" y2="148" stroke="url(#beam-fade)" stroke-width="2.5" opacity="0.9"/>

  <!-- =====================================================================
       PRISM TRIANGLE
       Apex (155, 22)  ·  Bottom-left (45, 265)  ·  Bottom-right (265, 265)
       Width ≈ 220 px  ·  Height ≈ 243 px  (prominent, fills most of canvas height)
       ===================================================================== -->
  <!-- Wide outer glow -->
  <polygon points="155,22 45,265 265,265" fill="none" stroke="#58a6ff" stroke-width="18" opacity="0.05"/>
  <!-- Mid glow -->
  <polygon points="155,22 45,265 265,265" fill="none" stroke="#58a6ff" stroke-width="7"  opacity="0.14"/>
  <!-- Very subtle glass fill -->
  <polygon points="155,22 45,265 265,265" fill="rgba(88,166,255,0.04)" stroke="none"/>
  <!-- Crisp main edges -->
  <polygon points="155,22 45,265 265,265" fill="none" stroke="#58a6ff" stroke-width="2.2" opacity="0.95"/>

  <!-- Apex highlight dot -->
  <circle cx="155" cy="22" r="10" fill="#58a6ff" opacity="0.08"/>
  <circle cx="155" cy="22" r="4"  fill="#58a6ff" opacity="0.90"/>

  <!-- =====================================================================
       REFRACTED LIGHT RAYS
       All originate from the right-face exit point ≈ (215, 156)
       Colours: red → orange → yellow → green → blue → violet (increasing refraction)
       Each drawn as 3 layers: wide glow / mid glow / crisp core
       ===================================================================== -->

  <!-- Red  (least refracted — goes up)  terminus y=50 -->
  <line x1="215" y1="156" x2="1200" y2="50"  stroke="#f85149" stroke-width="18" opacity="0.07"/>
  <line x1="215" y1="156" x2="1200" y2="50"  stroke="#f85149" stroke-width="6"  opacity="0.16"/>
  <line x1="215" y1="156" x2="1200" y2="50"  stroke="#f85149" stroke-width="2.5" opacity="0.85"/>

  <!-- Orange  terminus y=110 -->
  <line x1="215" y1="156" x2="1200" y2="110" stroke="#d18616" stroke-width="14" opacity="0.06"/>
  <line x1="215" y1="156" x2="1200" y2="110" stroke="#d18616" stroke-width="5"  opacity="0.14"/>
  <line x1="215" y1="156" x2="1200" y2="110" stroke="#d18616" stroke-width="2"  opacity="0.78"/>

  <!-- Yellow  terminus y=163 (near horizontal) -->
  <line x1="215" y1="156" x2="1200" y2="163" stroke="#d29922" stroke-width="18" opacity="0.07"/>
  <line x1="215" y1="156" x2="1200" y2="163" stroke="#d29922" stroke-width="6"  opacity="0.16"/>
  <line x1="215" y1="156" x2="1200" y2="163" stroke="#d29922" stroke-width="2.5" opacity="0.85"/>

  <!-- Green  terminus y=218 -->
  <line x1="215" y1="156" x2="1200" y2="218" stroke="#3fb950" stroke-width="18" opacity="0.07"/>
  <line x1="215" y1="156" x2="1200" y2="218" stroke="#3fb950" stroke-width="6"  opacity="0.17"/>
  <line x1="215" y1="156" x2="1200" y2="218" stroke="#3fb950" stroke-width="2.5" opacity="0.88"/>

  <!-- Blue  terminus y=262 -->
  <line x1="215" y1="156" x2="1200" y2="262" stroke="#58a6ff" stroke-width="18" opacity="0.07"/>
  <line x1="215" y1="156" x2="1200" y2="262" stroke="#58a6ff" stroke-width="6"  opacity="0.17"/>
  <line x1="215" y1="156" x2="1200" y2="262" stroke="#58a6ff" stroke-width="2.5" opacity="0.88"/>

  <!-- Violet  (most refracted — steepest down)  terminus y=296 -->
  <line x1="215" y1="156" x2="1200" y2="296" stroke="#bc8cff" stroke-width="14" opacity="0.06"/>
  <line x1="215" y1="156" x2="1200" y2="296" stroke="#bc8cff" stroke-width="5"  opacity="0.14"/>
  <line x1="215" y1="156" x2="1200" y2="296" stroke="#bc8cff" stroke-width="2"  opacity="0.80"/>

  <!-- =====================================================================
       WORDMARK  AND  TAGLINE
       Text starts at x=320, positioned just right of the prism
       ===================================================================== -->

  <!-- "PRISM" main wordmark -->
  <text
    x="320" y="182"
    font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,'Liberation Mono',monospace"
    font-size="94"
    font-weight="700"
    letter-spacing="0.07em"
    fill="#e6edf3"
  >PRISM</text>

  <!-- Thin separator rule -->
  <line x1="320" y1="200" x2="1148" y2="200" stroke="#30363d" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="323" y="228"
    font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,'Liberation Mono',monospace"
    font-size="21"
    letter-spacing="0.05em"
    fill="#8b949e"
  >session intelligence for claude code</text>

</svg>
